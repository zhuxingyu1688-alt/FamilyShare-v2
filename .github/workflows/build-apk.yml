name: Build Android APK Final Pro

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Prepare Artifacts
        run: |
          mkdir -p apk-output
          cp app/build/outputs/apk/release/app-release.apk apk-output/app-release.apk || true
          cp app/build/outputs/apk/debug/app-debug.apk apk-output/app-debug.apk || true
          ls -la apk-output/

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FamilyShare-v2-apk
          path: apk-output/
          retention-days: 90
