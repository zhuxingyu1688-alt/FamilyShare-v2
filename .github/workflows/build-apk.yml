name: Build Android APK Final Pro

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make Gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Prepare Artifacts
        run: |
          mkdir -p apk-output
          cp app/build/outputs/apk/release/app-release.apk apk-output/app-release.apk || true
          cp app/build/outputs/apk/debug/app-debug.apk apk-output/app-debug.apk || true
          ls -la apk-output/

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FamilyShare-v2-apk
          path: apk-output/
          retention-days: 90

      - name: Summary
        run: |
          echo "## 家庭共享 v2.0 双定时版" >> $GITHUB_STEP_SUMMARY
          echo "- 定时① + 定时② 独立闹钟" >> $GITHUB_STEP_SUMMARY
          echo "- 网络恢复自动重排" >> $GITHUB_STEP_SUMMARY
          echo "- OkHttp 单例 + 发送重试" >> $GITHUB_STEP_SUMMARY
